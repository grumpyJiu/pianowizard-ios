name: Build iOS Tweak

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Install Dependencies
        run: |
          brew install ldid dpkg make

      - name: Setup Theos
        run: |
          export THEOS=$HOME/theos
          git clone --recursive https://github.com/theos/theos.git $THEOS
          echo "THEOS=$THEOS" >> $GITHUB_ENV
          echo "$THEOS/bin" >> $GITHUB_PATH
          # Verify
          $THEOS/bin/nic.pl --version 2>&1 || echo "Theos installed"

      - name: Debug Environment
        run: |
          echo "THEOS=$THEOS"
          echo "SDK=$(xcrun --sdk iphoneos --show-sdk-path)"
          ls $(xcrun --sdk iphoneos --show-sdk-path)/System/Library/Frameworks/UIKit.framework/Headers/ 2>/dev/null | head -5
          which clang

      - name: Build
        run: |
          export THEOS=$HOME/theos
          export PATH=$THEOS/bin:$PATH
          make package FINALPACKAGE=1 2>&1

      - name: Upload DEB
        uses: actions/upload-artifact@v4
        with:
          name: PianoWizard-deb
          path: packages/*.deb
