name: Build iOS Tweak

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Setup Theos
        run: |
          git clone --recursive https://github.com/theos/theos.git $HOME/theos
          echo "THEOS=$HOME/theos" >> $GITHUB_ENV
          echo "$HOME/theos/bin" >> $GITHUB_PATH

      - name: Build PianoWizard
        run: |
          cd pianowizard-ios
          make package

      - name: Upload DEB
        uses: actions/upload-artifact@v4
        with:
          name: PianoWizard-deb
          path: pianowizard-ios/packages/*.deb
